<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoShield AI | Create Identity</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #050608;
            --card-bg: rgba(11, 22, 48, 0.9);
            --primary-accent: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(59, 130, 246, 0.2);
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
        }

        #video-bg {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -2;
            object-fit: cover;
            opacity: 0.4;
        }

        #video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(5, 6, 8, 0.8) 0%, rgba(5, 6, 8, 0.98) 100%);
            z-index: -1;
        }

        #signup-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        .logo-area h1 {
            font-size: 24px;
            margin: 0;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-area p {
            font-size: 10px;
            color: var(--primary-accent);
            opacity: 0.8;
            margin-top: 5px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3);
            margin-top: 10px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.5);
        }

        .action-btn:disabled {
            filter: grayscale(1);
            cursor: not-allowed;
            transform: none;
        }


        .link-text {
            font-size: 11px;
            margin-top: 20px;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
        }

        .link-text a {
            color: var(--primary-accent);
            text-decoration: none;
            font-weight: 600;
        }

        .link-text a:hover {
            text-decoration: underline;
        }

        #status-msg {
            font-size: 11px;
            margin-top: 15px;
            min-height: 15px;
            font-family: 'JetBrains Mono', monospace;
        }

        .success {
            color: var(--success);
        }

        .error {
            color: var(--danger);
        }
    </style>
</head>

<body>

    <video id="video-bg" autoplay muted loop playsinline>
        <source src="bg3-video.mp4.mp4" type="video/mp4">
    </video>
    <div id="video-overlay"></div>

    <div id="signup-card">
        <div class="logo-area">
            <h1>CryptoShield.AI</h1>
            <p>New Analyst Registration</p>
        </div>

        <form id="signupForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Choose a handle..." required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="agent@example.com" required>
            </div>

            <div class="input-group">
                <label>Secure Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="action-btn" id="submitBtn">Create Account</button>
        </form>

        <!-- OTP Section (Hidden by default) -->
        <div id="otp-section" style="display: none;">
            <div class="input-group" style="margin-top: 20px;">
                <label>Verification Code (OTP)</label>
                <input type="text" id="otp-input" placeholder="6-digit code" maxlength="6" style="text-align: center; font-size: 24px; letter-spacing: 5px;">
            </div>
            <button type="button" class="action-btn" id="verifyOtpBtn">Verify Account</button>
            <p style="font-size: 10px; color: var(--text-muted); margin-top: 15px;">
                Didn't get the code? <a href="#" onclick="location.reload()" style="color: var(--primary-accent);">Try Registration Again</a>
            </p>
        </div>

        <div id="status-msg"></div>

        <p class="link-text" id="login-link-container">
            Already have credentials? <a href="/login">Login Access</a>
        </p>
    </div>

    <script>
        let registeredUsername = "";


        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status-msg');

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            registeredUsername = username;
            btn.disabled = true;
            btn.innerText = "Registering...";
            statusDiv.className = '';
            statusDiv.innerText = "";

            try {
                const API_BASE = window.location.protocol === 'file:' ? 'http://127.0.0.1:8001' : '';
                const response = await fetch(API_BASE + '/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                let data;
                const contentType = response.headers.get("content-type");
                if (contentType && contentType.includes("application/json")) {
                    data = await response.json();
                } else {
                    const text = await response.text();
                    throw new Error(text || "Server Error (No Details)");
                }

                if (response.ok) {
                    // Hide signup form, show OTP section
                    document.getElementById('signupForm').style.display = 'none';
                    document.getElementById('otp-section').className = 'animate-in'; 
                    document.getElementById('otp-section').style.display = 'block';
                    
                    if (data.username) {
                        registeredUsername = data.username;
                    }

                    if (data.message && data.message.includes("resent")) {
                        statusDiv.innerHTML = `<div style="text-align: left; padding: 10px; border-left: 2px solid var(--primary-accent); background: rgba(59, 130, 246, 0.1); margin-top:10px;">
                            <strong>Code Resent!</strong><br>
                            We found your pending registration. A new 6-digit code has been sent to ${email}.
                        </div>`;
                    } else {
                        statusDiv.innerHTML = `<div style="text-align: left; padding: 10px; border-left: 2px solid var(--success); background: rgba(16, 185, 129, 0.1); margin-top:10px;">
                            <strong>Code Sent!</strong><br>
                            Enter the 6-digit code sent to ${email}.
                        </div>`;
                    }
                    statusDiv.className = 'success';
                } else {
                    throw new Error(data.detail || "Registration Failed");
                }
            } catch (err) {
                statusDiv.innerText = "> Error: " + err.message;
                statusDiv.className = 'error';
                btn.disabled = false;
                btn.innerText = "Create Account";
            }
        });

        document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
            let otp = document.getElementById('otp-input').value;
            otp = otp.trim();
            const statusDiv = document.getElementById('status-msg');
            const btn = document.getElementById('verifyOtpBtn');

            if (!otp || otp.length !== 6) {
                statusDiv.innerText = "> Error: Enter a 6-digit code";
                statusDiv.className = 'error';
                return;
            }

            btn.disabled = true;
            btn.innerText = "Verifying...";

            try {
                const API_BASE = window.location.protocol === 'file:' ? 'http://127.0.0.1:8001' : '';
                const response = await fetch(API_BASE + '/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: registeredUsername, otp: otp })
                });

                let data = await response.json();

                if (response.ok) {
                    statusDiv.innerHTML = "Success! Identity Verified.<br>Redirecting to login...";
                    statusDiv.className = 'success';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    throw new Error(data.detail || "Verification Failed");
                }
            } catch (err) {
                statusDiv.innerText = "> Error: " + err.message;
                statusDiv.className = 'error';
                btn.disabled = false;
                btn.innerText = "Verify Account";
            }
        });
    </script>
</body>

</html>
